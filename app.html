<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 App Controle de Obras</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --white: #fff; --text: #1e293b; --border: #e2e8f0; --success: #10b981; --danger: #ef4444; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        
        .app-container { max-width: 600px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .card { background: var(--white); padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #475569; }
        .form-group input, .form-group select { width: 100%; height: 45px; border-radius: 8px; border: 1px solid var(--border); padding: 0 15px; font-size: 1rem; background: var(--bg); outline: none;}
        .form-group input:focus { border-color: var(--primary); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-camera { background: rgba(37,99,235,0.05); color: var(--primary); border: 2px dashed var(--primary); height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.95rem; transition: 0.2s;}
        .btn-camera:hover { background: rgba(37,99,235,0.10); }
        
        .btn-arquivo { background: rgba(16,185,129,0.05); color: var(--success); border: 2px dashed var(--success); height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.95rem; transition: 0.2s;}
        .btn-arquivo:hover { background: rgba(16,185,129,0.10); }

        .btn-salvar { background: var(--primary); color: var(--white); border: none; height: 50px; border-radius: 8px; width: 100%; font-size: 1.1rem; font-weight: 800; margin-top: 20px; cursor: pointer; transition: 0.2s;}
        .btn-salvar:active { background: #1d4ed8; transform: scale(0.98); }
        
        #loader-salvar { display: none; text-align: center; font-weight: bold; margin-top: 15px; color: var(--primary); }
        #loader-ia { display: none; text-align: center; font-size: 0.85rem; font-weight: bold; margin-top: 10px; color: #6366f1; }
        #foto-status { font-size: 0.8rem; text-align: center; display: none; margin-top: 10px; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>

<div class="app-container">

    <div class="header">
        <h1>📸 Leitor NF / Cadastro</h1>
        <p style="margin:5px 0 0 0; font-size:0.9rem; color:#64748b;">Envio direto para a nuvem</p>
    </div>

    <div class="card">
        <div class="form-group">
            <label>Anexar Foto ou PDF da NF</label>
            <div class="grid-2">
                <input type="file" id="foto-camera" accept="image/*" capture="environment" style="display:none;" onchange="previewFotoEProcessarIA(event)">
                <button class="btn-camera" onclick="document.getElementById('foto-camera').click()">📷 Câmera</button>
                
                <input type="file" id="foto-arquivo" accept="image/*,application/pdf" style="display:none;" onchange="previewFotoEProcessarIA(event)">
                <button class="btn-arquivo" onclick="document.getElementById('foto-arquivo').click()">📄 Arquivo</button>
            </div>
            <p id="foto-status"></p>
            <div id="loader-ia">🤖 Lendo dados com Inteligência Artificial...</div>
        </div>

        <div class="form-group">
            <label>Tipo de Entrada</label>
            <select id="tipo"><option value="Locação">Locação (Aluguel)</option><option value="Compra">Patrimônio (Compra)</option></select>
        </div>
        
        <div class="form-group">
            <label>Obra / Destino</label>
            <input type="text" id="obra" placeholder="Ex: Sede Start Química">
        </div>

        <div class="form-group">
            <label>Equipamento ou Material</label>
            <input type="text" id="equipamento" placeholder="Ex: Betoneira 400L">
        </div>

        <div class="form-group">
            <label>Locadora / Fornecedor</label>
            <input type="text" id="fornecedor" placeholder="Nome da loja ou locadora">
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Quantidade</label>
                <input type="number" id="quantidade" value="1">
            </div>
            <div class="form-group">
                <label>Valor Total (R$)</label>
                <input type="number" id="valor" step="0.01" placeholder="0.00">
            </div>
        </div>

        <button class="btn-salvar" onclick="salvarDados()">🚀 Enviar para o Sistema</button>
        <div id="loader-salvar">⏳ Salvando na nuvem... Aguarde.</div>
    </div>

</div>

    <script>
        // ALERTA GLOBAL DE BUGS PARA IDENTIFICAR ERROS OCULTOS
        window.onerror = function(msg, url, line) {
            alert("⚠️ Erro no Sistema:\n" + msg + "\nLinha: " + line);
            return true;
        };

        const GEMINI_API_KEY = 'AIzaSyD_yorwczN1p3WcasUrfVYChF8w6E4QvP0';
        const SUPABASE_URL = 'https://aidlesbrbwfxpziivkgw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1wUqabj2T6y9L5tC-tAnwA_bzj-fyx0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let fotoBase64 = null;
        let mimeType = '';

        function previewFotoEProcessarIA(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const isPDF = file.type === 'application/pdf';
            mimeType = isPDF ? 'application/pdf' : file.type;
            
            const statusBox = document.getElementById('foto-status');
            statusBox.style.display = 'block';
            statusBox.innerText = isPDF ? `📄 PDF Selecionado: ${file.name}` : `✅ Foto Anexada: ${file.name}`;
            statusBox.style.color = isPDF ? 'var(--danger)' : 'var(--success)';
            
            const reader = new FileReader();
            reader.onload = (e) => { 
                fotoBase64 = e.target.result; 
                extrairDadosComIA(fotoBase64, mimeType);
            };
            reader.readAsDataURL(file);
        }

        // FUNÇÃO BLINDADA PARA LIMPAR O VALOR MONETÁRIO
        function formatarValorParaInput(texto) {
            if (!texto) return 0;
            let limpo = String(texto).replace(/[^\d.,]/g, '');
            if (limpo.includes(',') && limpo.includes('.')) {
                limpo = limpo.replace(/\./g, '').replace(',', '.');
            } else if (limpo.includes(',')) {
                limpo = limpo.replace(',', '.');
            }
            return parseFloat(limpo) || 0;
        }

        async function extrairDadosComIA(base64String, mime) {
            if (!GEMINI_API_KEY) return;
            document.getElementById('loader-ia').style.display = 'block';
            
            try {
                const base64Data = base64String.split(',')[1];
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Analise o documento fiscal. Retorne APENAS um JSON estrito. Chaves: 'fornecedor', 'equipamento', 'quantidade' e 'valor'. Sem blocos de código (```json)." },
                                { inline_data: { mime_type: mime, data: base64Data } }
                            ]
                        }]
                    })
                });

                if (!response.ok) throw new Error(`Google IA falhou (Erro ${response.status})`);

                const data = await response.json();
                let respostaTexto = data.candidates[0].content.parts[0].text;
                
                let inicio = respostaTexto.indexOf('{');
                let fim = respostaTexto.lastIndexOf('}');
                if (inicio === -1 || fim === -1) throw new Error("A IA não retornou um formato reconhecível.");
                
                let jsonLimpo = respostaTexto.substring(inicio, fim + 1);
                const info = JSON.parse(jsonLimpo);

                if(info.fornecedor) document.getElementById('fornecedor').value = info.fornecedor;
                if(info.equipamento) document.getElementById('equipamento').value = info.equipamento;
                
                if(info.quantidade) {
                    let qtdTratada = parseInt(String(info.quantidade).replace(/\D/g, '')) || 1;
                    document.getElementById('quantidade').value = qtdTratada;
                }
                if(info.valor) {
                    document.getElementById('valor').value = formatarValorParaInput(info.valor);
                }

            } catch (error) {
                console.error(error);
                alert("⚠️ A IA teve dificuldade em ler esta nota. Por favor, preencha os dados manualmente.");
            } finally {
                document.getElementById('loader-ia').style.display = 'none';
            }
        }

        // NOVO MOTOR DE CONVERSÃO (NUNCA TRAVA A MEMÓRIA DO CELULAR/PC)
        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], {type: mimeString});
        }

        async function salvarDados() {
            const obra = document.getElementById('obra').value.trim();
            const equip = document.getElementById('equipamento').value.trim();
            const forn = document.getElementById('fornecedor').value.trim() || 'Não identificado';
            const qtd = parseInt(document.getElementById('quantidade').value) || 1;
            const valor = parseFloat(document.getElementById('valor').value) || 0;
            const tipo = document.getElementById('tipo').value;

            if (!obra || !equip) return alert("⚠️ Preencha a Obra e o Equipamento!");

            document.getElementById('loader-salvar').style.display = 'block';

            let urlAnexo = null;

            if (fotoBase64) {
                try {
                    const blob = dataURItoBlob(fotoBase64);
                    const extensao = mimeType.includes('pdf') ? 'pdf' : 'jpg';
                    const fileName = `mobile_nf_${Date.now()}.${extensao}`;
                    
                    const { data, error } = await supabase.storage.from('comprovantes').upload(fileName, blob);
                    if (!error) {
                        urlAnexo = supabase.storage.from('comprovantes').getPublicUrl(data.path).data.publicUrl;
                    }
                } catch(e) { 
                    console.error(e); 
                    alert("⚠️ Erro ao subir o anexo, mas vamos tentar salvar os textos.");
                }
            }

            const dataAtual = new Date().toISOString().split('T')[0];
            
            const payload = {
                obra: obra,
                equipamento: equip,
                fornecedor: forn,
                quantidade: qtd,
                valor: valor,
                data_inicio: dataAtual,
                status: 'ativo',
                anexo: urlAnexo,
                unidade: tipo === 'Compra' ? 'Proprio' : 'Mês',
                contrato: tipo === 'Compra' ? 'NF Compra Mobile' : 'NF via App'
            };

            try {
                const { error } = await supabase.from('locacoes').insert([payload]);

                if (error) {
                    alert("❌ Erro no Banco de Dados: " + error.message);
                } else {
                    alert("✅ Salvo com sucesso no Painel!");
                    document.getElementById('equipamento').value = '';
                    document.getElementById('valor').value = '';
                    document.getElementById('foto-camera').value = '';
                    document.getElementById('foto-arquivo').value = '';
                    document.getElementById('foto-status').style.display = 'none';
                    fotoBase64 = null;
                }
            } catch(err) {
                alert("❌ Erro crítico ao conectar com o banco de dados.");
            } finally {
                document.getElementById('loader-salvar').style.display = 'none';
            }
        }
    </script>
</body>
</html>
