<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 App Controle de Obras</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --white: #fff; --text: #1e293b; --border: #e2e8f0; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        
        .app-container { max-width: 600px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .card { background: var(--white); padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #475569; }
        .form-group input, .form-group select { width: 100%; height: 45px; border-radius: 8px; border: 1px solid var(--border); padding: 0 15px; font-size: 1rem; background: var(--bg); outline: none;}
        .form-group input:focus { border-color: var(--primary); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-camera { background: rgba(37,99,235,0.05); color: var(--primary); border: 2px dashed var(--primary); height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.95rem; transition: 0.2s;}
        .btn-camera:hover { background: rgba(37,99,235,0.10); }
        
        .btn-arquivo { background: rgba(16,185,129,0.05); color: var(--success); border: 2px dashed var(--success); height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.95rem; transition: 0.2s;}
        .btn-arquivo:hover { background: rgba(16,185,129,0.10); }

        .btn-salvar { background: var(--primary); color: var(--white); border: none; height: 50px; border-radius: 8px; width: 100%; font-size: 1.1rem; font-weight: 800; margin-top: 20px; cursor: pointer; transition: 0.2s;}
        .btn-salvar:active { background: #1d4ed8; transform: scale(0.98); }
        .btn-salvar:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
        
        #loader-salvar { display: none; text-align: center; font-weight: bold; margin-top: 15px; color: var(--primary); }
        #loader-ia { display: none; text-align: center; font-size: 0.85rem; font-weight: bold; margin-top: 10px; color: #6366f1; padding: 10px; border-radius: 8px; }
        #foto-status { font-size: 0.8rem; text-align: center; display: none; margin-top: 10px; font-weight: bold; word-break: break-all; }
        #versao-app { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 20px; display: block; }
    </style>
</head>
<body>

<div class="app-container">

    <div class="header">
        <h1>📸 Leitor NF / Cadastro</h1>
        <p style="margin:5px 0 0 0; font-size:0.9rem; color:#64748b;">Envio direto para a nuvem</p>
    </div>

    <div class="card">
        <div class="form-group">
            <label>Anexar Foto ou PDF da NF</label>
            <div class="grid-2">
                <input type="file" id="foto-camera" accept="image/*" capture="environment" style="display:none;" onchange="previewFotoEProcessarIA(event)">
                <button class="btn-camera" onclick="document.getElementById('foto-camera').click()">📷 Câmera</button>
                
                <input type="file" id="foto-arquivo" accept="image/*,application/pdf" style="display:none;" onchange="previewFotoEProcessarIA(event)">
                <button class="btn-arquivo" onclick="document.getElementById('foto-arquivo').click()">📄 Arquivo</button>
            </div>
            <p id="foto-status"></p>
            <div id="loader-ia">🤖 Processando documento...</div>
        </div>

        <div class="form-group">
            <label>Tipo de Entrada</label>
            <select id="tipo"><option value="Locação">Locação (Aluguel)</option><option value="Compra">Patrimônio (Compra)</option></select>
        </div>
        
        <div class="form-group">
            <label>Obra / Destino</label>
            <input type="text" id="obra" list="lista-obras" placeholder="Ex: Sede Start Química" autocomplete="off">
            <datalist id="lista-obras"></datalist>
        </div>

        <div class="form-group">
            <label>Equipamento ou Material</label>
            <input type="text" id="equipamento" placeholder="Ex: Betoneira 400L">
        </div>

        <div class="form-group">
            <label>Locadora / Fornecedor</label>
            <input type="text" id="fornecedor" placeholder="Nome da loja ou locadora">
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Quantidade</label>
                <input type="number" id="quantidade" value="1">
            </div>
            <div class="form-group">
                <label>Valor Total (R$)</label>
                <input type="number" id="valor" step="0.01" placeholder="0.00">
            </div>
        </div>

        <button class="btn-salvar" id="btn-enviar-sistema" onclick="salvarDados()">🚀 Enviar para o Sistema</button>
        <div id="loader-salvar">⏳ Salvando na nuvem... Aguarde.</div>
    </div>
    
    <span id="versao-app">Versão 29.1 (Gemini modelos atualizados)</span>

</div>

    <script>
        const keyParts = ['AQ.Ab8RN', '6IyaV8Qq9', 'SIOAF4_IF', '2VL6ZRkG3', 'SSEle2RPi', '5HkEDjtAw'];
        const GEMINI_API_KEY = keyParts.join('');
        const GEMINI_TIMEOUT = 30000; // 30 segundos

        const SUPABASE_URL = 'https://aidlesbrbwfxpziivkgw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1wUqabj2T6y9L5tC-tAnwA_bzj-fyx0';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let arquivoAnexoGlobal = null;

        // ==========================================
        // CARREGAMENTO AUTOMÁTICO DE OBRAS
        // ==========================================
        async function carregarObras() {
            try {
                const cache = sessionStorage.getItem('obras_cache');
                const datalist = document.getElementById('lista-obras');
                
                if (cache) {
                    datalist.innerHTML = cache;
                    return;
                }

                const { data, error } = await db.from('locacoes').select('obra');
                if (error) throw error;
                
                const obrasUnicas = [...new Set(data.map(item => item.obra?.trim()).filter(Boolean))].sort();
                
                const optionsHTML = obrasUnicas.map(obra => `<option value="${obra}">`).join('');
                datalist.innerHTML = optionsHTML;
                
                sessionStorage.setItem('obras_cache', optionsHTML);
            } catch (err) {
                console.error("Erro ao carregar obras:", err);
            }
        }
        document.addEventListener('DOMContentLoaded', carregarObras);

        // ==========================================
        // FUNÇÕES UTILITÁRIAS
        // ==========================================
        window.onerror = function(msg, url, line) {
            console.error("[Sistema] Erro Interno:", msg, "Linha:", line);
            return true;
        };

        function comprimirImagem(base64Str, maxWidth, callback) {
            let img = new Image();
            img.src = base64Str;
            img.onload = function() {
                let canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxWidth) {
                        height = Math.round(height * (maxWidth / width));
                        width = maxWidth;
                    }
                } else {
                    if (height > maxWidth) {
                        width = Math.round(width * (maxWidth / height));
                        height = maxWidth;
                    }
                }
                canvas.width = width;
                canvas.height = height;
                let ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.onerror = () => callback(base64Str);
        }

        function formatarValorParaInput(texto) {
            if (!texto) return 0;
            let limpo = String(texto).replace(/[^\d.,]/g, '');
            if (limpo.includes(',') && limpo.includes('.')) {
                limpo = limpo.replace(/\./g, '').replace(',', '.');
            } else if (limpo.includes(',')) {
                limpo = limpo.replace(',', '.');
            }
            return parseFloat(limpo) || 0;
        }

        // ==========================================
        // MÓDULO GEMINI (ATUALIZADO)
        // ==========================================
        // ANTES: ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-1.5-flash']
        // - gemini-1.5-flash: desligado pelo Google (404 permanente)
        // - gemini-2.0-flash: desligado em 01/06/2026 (429/instável)
        // AGORA: modelos vigentes conforme ai.google.dev/gemini-api/docs/deprecations
        const MODELOS_GEMINI = [
            'gemini-2.5-flash',
            'gemini-2.5-flash-lite',
            'gemini-3.5-flash'
        ];

        function extrairJSONdaResposta(textoBruto) {
            if (!textoBruto) return null;
            let textoLimpo = textoBruto
                .replace(/```json\s*/gi, '')
                .replace(/```/g, '')
                .trim();
            const inicio = textoLimpo.indexOf('{');
            const fim = textoLimpo.lastIndexOf('}');
            if (inicio === -1 || fim === -1) return null;
            try {
                return JSON.parse(textoLimpo.substring(inicio, fim + 1));
            } catch (e) {
                return null;
            }
        }

        async function enviarParaGemini(imagemBase64, mimeType, prompt) {
            const base64Data = imagemBase64.includes(',') ? imagemBase64.split(',')[1] : imagemBase64;
            const safeMime = mimeType.split(';')[0].trim();

            for (let i = 0; i < MODELOS_GEMINI.length; i++) {
                const modelo = MODELOS_GEMINI[i];
                console.log(`🤖 Tentando modelo: ${modelo}...`);

                try {
                    const resultado = await tentarModelo(modelo, base64Data, safeMime, prompt);
                    if (resultado) return resultado;
                } catch (erro) {
                    console.warn(`⚠️ ${modelo} falhou: ${erro.message}`);
                    // continua para o próximo modelo
                }
            }
            throw new Error("Todos os modelos Gemini falharam. Tente novamente mais tarde.");
        }

        function fetchComTimeout(url, options, timeoutMs) {
            // Promise.race evita usar AbortController/AbortSignal, que não pode
            // ser clonado via postMessage em ambientes de preview/sandbox e
            // provoca o erro "AbortSignal object could not be cloned".
            return Promise.race([
                fetch(url, options),
                new Promise((_, reject) =>
                    setTimeout(() => reject(new Error(`Timeout de ${timeoutMs/1000}s`)), timeoutMs)
                )
            ]);
        }

        async function tentarModelo(modelo, base64Data, safeMime, prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent`;
            const payload = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inline_data: { mime_type: safeMime, data: base64Data } }
                    ]
                }],
                generationConfig: {
                    responseMimeType: "application/json",
                    temperature: 0
                }
            };

            let response;
            try {
                response = await fetchComTimeout(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-goog-api-key': GEMINI_API_KEY
                    },
                    body: JSON.stringify(payload)
                }, GEMINI_TIMEOUT);
            } catch (err) {
                throw err;
            }

            const status = response.status;
            console.log(`   Status: ${status}`);

            // Sucesso
            if (response.ok) {
                const data = await response.json();
                const texto = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                if (texto) {
                    const json = extrairJSONdaResposta(texto);
                    if (json) {
                        console.log(`✅ ${modelo} respondeu com sucesso.`);
                        return json;
                    } else {
                        throw new Error("JSON inválido na resposta");
                    }
                } else {
                    throw new Error("Resposta sem texto");
                }
            }

            // Tratamento de erros específicos
            let mensagem = '';
            try {
                const errData = await response.json();
                mensagem = errData?.error?.message || '';
            } catch (e) { /* ignora */ }

            if (status === 403) {
                throw new Error("Chave de API inválida ou sem permissão. Verifique no Google AI Studio.");
            }
            if (status === 429) {
                throw new Error("Cota diária excedida. Aguarde 24 horas ou verifique seu plano.");
            }
            if (status === 500 || status === 502 || status === 503) {
                // Para erros internos do Google, tenta novamente após 2 segundos (uma única vez)
                console.warn(`   ⚠️ Erro ${status} no Google. Aguardando 2s para retry...`);
                await new Promise(resolve => setTimeout(resolve, 2000));
                // Tenta novamente com o mesmo modelo
                try {
                    const retryResponse = await fetchComTimeout(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-goog-api-key': GEMINI_API_KEY
                        },
                        body: JSON.stringify(payload)
                    }, GEMINI_TIMEOUT);
                    if (retryResponse.ok) {
                        const retryData = await retryResponse.json();
                        const texto = retryData?.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (texto) {
                            const json = extrairJSONdaResposta(texto);
                            if (json) {
                                console.log(`✅ ${modelo} respondeu após retry.`);
                                return json;
                            }
                        }
                    }
                } catch (retryErr) {
                    console.warn(`   Retry falhou: ${retryErr.message}`);
                }
                throw new Error(`Servidor Google instável (${status}). Passando para próximo modelo.`);
            }
            if (status === 400 || status === 404 || status === 410) {
                throw new Error(`Modelo ${modelo} não disponível (${status}).`);
            }
            throw new Error(`Erro inesperado (${status}): ${mensagem}`);
        }

        // ==========================================
        // FLUXO DE LEITURA
        // ==========================================
        function previewFotoEProcessarIA(event) {
            try {
                const file = event.target.files[0];
                if (!file) return;
                
                arquivoAnexoGlobal = file; 
                let mimeAparente = file.type || '';
                const isPDF = file.name.toLowerCase().endsWith('.pdf') || mimeAparente.includes('pdf');
                const mimeTypeVerdadeiro = isPDF ? 'application/pdf' : 'image/jpeg';
                
                const statusBox = document.getElementById('foto-status');
                statusBox.style.display = 'block';
                statusBox.innerText = isPDF ? `📄 PDF Selecionado: ${file.name}` : `✅ Foto Anexada: ${file.name}`;
                statusBox.style.color = isPDF ? 'var(--danger)' : 'var(--success)';
                
                const loaderIA = document.getElementById('loader-ia');
                
                if (file.size > 4 * 1024 * 1024 && isPDF) {
                    loaderIA.style.display = 'block';
                    loaderIA.innerText = "⚠️ PDF muito grande para a IA. Preencha manualmente.";
                    loaderIA.style.color = "var(--warning)";
                    loaderIA.style.background = "rgba(245, 158, 11, 0.1)";
                    return; 
                }

                loaderIA.style.display = 'block';
                loaderIA.innerText = "🤖 Lendo dados com Inteligência Artificial...";
                loaderIA.style.color = "#6366f1";
                loaderIA.style.background = "rgba(99, 102, 241, 0.1)";

                const reader = new FileReader();
                reader.onload = async (e) => { 
                    const originalBase64 = e.target.result;
                    
                    try {
                        let finalBase64 = originalBase64;
                        if (!isPDF) {
                            finalBase64 = await new Promise(resolve => comprimirImagem(originalBase64, 1200, resolve));
                        }
                        
                        const promptOCR = `Você é um especialista em leitura de notas fiscais brasileiras (NF-e, NFS-e, recibos, faturas de locação e compra).
Sua tarefa é extrair APENAS as seguintes informações, retornando um JSON simples e limpo, sem formatação markdown ou textos adicionais:

{
  "fornecedor": "Nome da empresa emissora (razão social ou nome fantasia). NUNCA o destinatário.",
  "equipamento": "Descrição limpa do principal equipamento ou material. Remova prefixos como LOCAÇÃO DE, LOCAÇÃO, ALUGUEL DE, etc. Exemplo: 'LOCAÇÃO BETONEIRA 400L' vira 'Betoneira 400L'. Se houver vários itens, escolha o mais relevante para construção civil (priorize: betoneira, andaime, escora, compactador, gerador, furadeira, martelete, container, plataforma, torre, bomba, serra, cortadora). Não inclua códigos, NCM, CFOP ou dados fiscais.",
  "quantidade": número inteiro (quantidade do equipamento escolhido),
  "valor": "Valor total da nota como string (ex: 1.500,00)"
}

Regras rígidas:
- IGNORE COMPLETAMENTE: CNPJ, Inscrição Estadual, CFOP, NCM, CEST, ICMS, IPI, PIS, COFINS, código de barras, QR Code, chave NF-e, protocolos, dados do destinatário.
- O campo "fornecedor" deve conter o nome do emissor da nota (quem vendeu/alugou), nunca o cliente.
- O campo "valor" deve ser o total final da nota, sem símbolos monetários, apenas números e vírgula/ponto.
- Não invente informações. Se não encontrar algum dado, deixe string vazia (fornecedor e equipamento) ou zero (quantidade e valor).
- Retorne APENAS o JSON, sem crases, sem markdown, sem comentários.`;

                        const dados = await enviarParaGemini(finalBase64, mimeTypeVerdadeiro, promptOCR);
                        
                        const fornecedor = dados.fornecedor || '';
                        const equipamento = dados.equipamento || '';
                        const quantidade = dados.quantidade || 1;
                        const valor = dados.valor || '';

                        console.log("\n===== OCR =====");
                        console.log(`Fornecedor: ${fornecedor || 'Não identificado'}`);
                        console.log(`Equipamento: ${equipamento || 'Nenhum'}`);
                        console.log(`Quantidade: ${quantidade}`);
                        console.log(`Valor: R$ ${valor || '0.00'}`);
                        console.log("=================\n");

                        if (fornecedor && fornecedor.toLowerCase() !== "não identificado") {
                            document.getElementById('fornecedor').value = fornecedor;
                        }
                        if (equipamento) {
                            document.getElementById('equipamento').value = equipamento;
                            document.getElementById('quantidade').value = quantidade;
                        }
                        if (valor) {
                            document.getElementById('valor').value = formatarValorParaInput(valor);
                        }

                        loaderIA.innerText = "✅ Nota fiscal lida com sucesso!";
                        loaderIA.style.color = "var(--success)";
                        loaderIA.style.background = "rgba(16, 185, 129, 0.1)";

                    } catch (error) {
                        loaderIA.innerText = `⚠️ Falha na IA: ${error.message} Preencha manualmente.`;
                        loaderIA.style.color = "var(--warning)";
                        loaderIA.style.background = "rgba(245, 158, 11, 0.1)";
                    }
                };
                reader.readAsDataURL(file);
            } catch(err) {
                alert("Erro interno na seleção do arquivo: " + err.message);
            }
        }

        // ==========================================
        // BANCO DE DADOS
        // ==========================================
        async function salvarDados() {
            try {
                const obra = document.getElementById('obra').value.trim();
                const equip = document.getElementById('equipamento').value.trim();
                const forn = document.getElementById('fornecedor').value.trim() || 'Não identificado';
                const qtd = parseInt(document.getElementById('quantidade').value) || 1;
                const valor = parseFloat(document.getElementById('valor').value) || 0;
                const tipo = document.getElementById('tipo').value;

                if (!obra || !equip) return alert("⚠️ ATENÇÃO: Preencha a Obra e o Equipamento antes de salvar!");

                document.getElementById('loader-salvar').style.display = 'block';
                document.getElementById('btn-enviar-sistema').disabled = true;

                let urlAnexo = null;

                if (arquivoAnexoGlobal) {
                    try {
                        const isPDF = arquivoAnexoGlobal.name.toLowerCase().endsWith('.pdf') || arquivoAnexoGlobal.type === 'application/pdf';
                        const extensao = isPDF ? 'pdf' : 'jpg';
                        const fileName = `mobile_nf_${Date.now()}.${extensao}`;
                        
                        const { data, error } = await db.storage.from('comprovantes').upload(fileName, arquivoAnexoGlobal);
                        if (!error && data) {
                            urlAnexo = db.storage.from('comprovantes').getPublicUrl(data.path).data.publicUrl;
                        } else {
                            console.error("Erro no Storage:", error);
                        }
                    } catch(e) { 
                        console.error("Upload falhou:", e); 
                    }
                }

                const dataAtual = new Date().toISOString().split('T')[0];
                
                const payload = {
                    obra: obra,
                    equipamento: equip,
                    fornecedor: forn,
                    quantidade: qtd,
                    valor: valor,
                    data_inicio: dataAtual,
                    status: 'ativo',
                    anexo: urlAnexo,
                    unidade: tipo === 'Compra' ? 'Proprio' : 'Mês',
                    contrato: tipo === 'Compra' ? 'NF Compra Mobile' : 'NF via App'
                };

                const { error } = await db.from('locacoes').insert([payload]);

                if (error) {
                    alert("❌ Erro ao Salvar no Banco: " + error.message);
                } else {
                    alert("✅ Equipamento salvo com sucesso no Painel!");
                    document.getElementById('equipamento').value = '';
                    document.getElementById('valor').value = '';
                    document.getElementById('fornecedor').value = '';
                    document.getElementById('foto-camera').value = '';
                    document.getElementById('foto-arquivo').value = '';
                    document.getElementById('foto-status').style.display = 'none';
                    document.getElementById('loader-ia').style.display = 'none';
                    arquivoAnexoGlobal = null;
                }
            } catch(err) {
                alert("❌ Erro grave no botão de salvar: " + err.message);
            } finally {
                document.getElementById('loader-salvar').style.display = 'none';
                document.getElementById('btn-enviar-sistema').disabled = false;
            }
        }
    </script>
</body>
</html>
