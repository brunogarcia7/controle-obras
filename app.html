<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Almoxarife - Controle Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --bg-app: #f1f5f9; --header: #1e293b; --card: #ffffff; --primary: #2563eb; --success: #10b981; --warning: #f59e0b; --text: #334155; --text-light: #94a3b8; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background-color: #333; margin: 0; display: flex; justify-content: center; }
        .mobile-container { width: 100%; max-width: 420px; height: 100vh; background-color: var(--bg-app); position: relative; overflow-y: auto; display: flex; flex-direction: column; }
        
        .header { background-color: var(--header); color: white; padding: 25px 20px 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .header h1 { margin: 0; font-size: 1.3rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .header p { margin: 5px 0 0 0; color: #cbd5e1; font-size: 0.85rem; }
        .badge-v8 { background: var(--primary); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-left: 5px; font-weight: 800; }
        
        .content { padding: 20px; flex: 1; }
        
        .form-group { margin-bottom: 20px; }
        label { font-size: 0.8rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; }
        select, input[type="text"], input[type="number"] { width: 100%; height: 45px; border-radius: 10px; border: 2px solid #cbd5e1; padding: 0 15px; font-size: 1rem; margin-top: 5px; background: white; font-family: 'Inter', sans-serif; box-sizing: border-box;}

        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-acao { background: var(--card); border: 2px solid transparent; border-radius: 16px; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        .btn-acao .icon-box { width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; margin-bottom: 10px; }
        .btn-acao h3 { margin: 0; font-size: 0.9rem; color: var(--text); font-weight: 700; }
        
        .btn-compra { border-color: rgba(16, 185, 129, 0.3); } .btn-compra .icon-box { background: #dcfce7; color: var(--success); }
        .btn-aluguel { border-color: rgba(37, 99, 235, 0.3); } .btn-aluguel .icon-box { background: #dbeafe; color: var(--primary); }
        .btn-lista { border-color: rgba(245, 158, 11, 0.3); grid-column: 1 / -1; flex-direction: row; justify-content: center; }
        .btn-lista .icon-box { margin-bottom: 0; margin-right: 15px; background: #fef3c7; color: var(--warning); }

        /* LISTA DE ATIVOS NO CELULAR */
        #lista-ativos-mobile { margin-top: 20px; display: none; }
        .card-ativo { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-ativo h4 { margin: 0; font-size: 1rem; color: var(--text); }
        .card-ativo p { margin: 5px 0; font-size: 0.8rem; color: var(--text-light); }
        .btn-renovar-mob { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 700; font-size: 0.8rem; margin-top: 10px; cursor: pointer; width: 100%;}

        #ai-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); display: none; flex-direction: column; justify-content: flex-start; align-items: center; color: white; z-index: 100; padding: 40px 20px; box-sizing: border-box; overflow-y: auto;}
        .loader { border: 5px solid rgba(255,255,255,0.2); border-top: 5px solid var(--success); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #resultado-ia { background: white; color: var(--text); padding: 15px; border-radius: 12px; width: 100%; display: none; margin-bottom: 20px;}
        .fallback-box { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px dashed #cbd5e1; margin-top: 10px; }
        .fallback-box label { font-size: 0.7rem; color: #475569; display: block; margin-top: 8px; }
        
        .btn-confirmar { background: var(--success); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 1rem; font-weight: 700; margin-bottom: 10px; }
        .btn-cancelar { background: transparent; color: white; border: 1px solid white; padding: 10px; border-radius: 12px; width: 100%; font-size: 1rem; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="header">
        <h1>👷 Almoxarifado <span class="badge-v8">v8</span></h1>
        <p>Leitor IA & Gestão de Obras</p>
    </div>

    <div class="content">
        <div class="form-group">
            <label>1. Selecione a Obra</label>
            <select id="obraSelect">
                <option value="" disabled selected>Carregando obras...</option>
            </select>
        </div>

        <div class="grid-botoes">
            <button class="btn-acao btn-compra" onclick="iniciarLeitura('compra')">
                <div class="icon-box">🛒</div>
                <h3>Nova Compra</h3>
            </button>
            <button class="btn-acao btn-aluguel" onclick="iniciarLeitura('aluguel')">
                <div class="icon-box">📄</div>
                <h3>Nova Locação</h3>
            </button>
            <button class="btn-acao btn-lista" onclick="toggleAtivos()">
                <div class="icon-box">🛠️</div>
                <h3>Ver Equipamentos da Obra</h3>
            </button>
        </div>

        <div id="lista-ativos-mobile">
            <label>Equipamentos em Obra:</label>
            <div id="container-cards"></div>
        </div>

        <input type="file" id="cam-entrada" accept="image/*" capture="environment" onchange="processarFoto(event)">
    </div>

    <div id="ai-modal">
        <div class="loader" id="ai-loader"></div>
        <div id="modal-text">Processando...</div>
        <div id="resultado-ia"></div>
        <button class="btn-confirmar" id="btn-salvar" onclick="salvarNoBanco()">✅ Confirmar e Salvar</button>
        <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
    </div>
</div>

<script>
    // CHAVES INTEGRADAS
    const SUPABASE_URL = 'https://aidlesbrbwfxpziivkgw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_1wUqabj2T6y9L5tC-tAnwA_bzj-fyx0';
    const G_P1 = 'AIzaSyD_yorwczN1p3Wc'; 
    const G_P2 = 'asUrfVYChF8w6E4QvP0'; 
    const GEMINI_API_KEY = G_P1 + G_P2;

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let itensLidosPelaIA = [];
    let modoAtual = '';

    // CORREÇÃO: Carregar obras com Fallback
    async function carregarObras() {
        const sel = document.getElementById('obraSelect');
        const padrao = ["Vinícola", "Sede Start Química", "Tamboré"];
        try {
            const { data } = await client.from('locacoes').select('obra');
            let obrasBanco = data ? [...new Set(data.map(i => i.obra))].filter(Boolean) : [];
            let lista = [...new Set([...padrao, ...obrasBanco])].sort();
            sel.innerHTML = '<option value="" disabled selected>Selecione a obra...</option>';
            lista.forEach(o => sel.add(new Option(o, o)));
        } catch (e) {
            sel.innerHTML = '<option value="" disabled selected>Selecione a obra...</option>';
            padrao.forEach(o => sel.add(new Option(o, o)));
        }
    }
    carregarObras();

    function iniciarLeitura(modo) {
        if(!document.getElementById('obraSelect').value) { alert("Selecione a obra!"); return; }
        modoAtual = modo;
        document.getElementById('cam-entrada').click();
    }

    async function processarFoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        abrirModal("Comprimindo e lendo documento...");
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1200;
            const scale = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH; canvas.height = img.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            chamarGeminiAPI(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
        };
    }

    async function chamarGeminiAPI(base64) {
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        const prompt = modoAtual === 'compra' ? 
            `Extraia itens de compra: JSON { "itens": [{"equipamento", "fornecedor", "valor"}] }` :
            `Extraia locação: JSON { "itens": [{"equipamento", "fornecedor", "contrato_numero", "periodo", "valor"}] }`;

        try {
            const res = await fetch(url, { method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }] }) });
            const d = await res.json();
            let txt = d.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
            itensLidosPelaIA = JSON.parse(txt).itens || [];
            mostrarResultado();
        } catch (e) { fecharModal(); alert("Erro na leitura da IA."); }
    }

    function mostrarResultado() {
        document.getElementById('ai-loader').style.display = 'none';
        const resDiv = document.getElementById('resultado-ia');
        resDiv.style.display = 'block'; document.getElementById('btn-salvar').style.display = 'block';
        resDiv.innerHTML = '';
        itensLidosPelaIA.forEach((item, i) => {
            resDiv.innerHTML += `
                <div class="item-lido">
                    <strong>${item.equipamento}</strong>
                    <div class="fallback-box">
                        <label>Loja/Locadora</label> <input type="text" id="fn-${i}" value="${item.fornecedor || ''}">
                        ${modoAtual === 'aluguel' ? `
                            <label>Nº Contrato</label> <input type="text" id="ct-${i}" value="${item.contrato_numero || ''}">
                            <label>Período</label> <select id="pe-${i}"><option value="Mês">Mês</option><option value="Quinzena">Quinzena</option><option value="Dia">Dia</option></select>
                        ` : ''}
                        <label>Valor (R$)</label> <input type="number" id="vl-${i}" value="${item.valor || 0}">
                    </div>
                </div>`;
        });
    }

    async function salvarNoBanco() {
        const obra = document.getElementById('obraSelect').value;
        const dados = itensLidosPelaIA.map((it, i) => ({
            obra, equipamento: it.equipamento,
            fornecedor: document.getElementById(`fn-${i}`).value,
            valor: parseFloat(document.getElementById(`vl-${i}`).value),
            unidade: modoAtual === 'compra' ? 'Proprio' : document.getElementById(`pe-${i}`).value,
            contrato: modoAtual === 'compra' ? 'NF Compra' : document.getElementById(`ct-${i}`).value,
            data_inicio: new Date().toISOString().split('T')[0],
            status: 'ativo'
        }));
        await client.from('locacoes').insert(dados);
        alert("Salvo com sucesso!"); fecharModal();
    }

    async function toggleAtivos() {
        const obra = document.getElementById('obraSelect').value;
        if(!obra) { alert("Selecione a obra primeiro!"); return; }
        const div = document.getElementById('lista-ativos-mobile');
        div.style.display = div.style.display === 'block' ? 'none' : 'block';
        if(div.style.display === 'block') {
            const { data } = await client.from('locacoes').select('*').eq('obra', obra).eq('status', 'ativo');
            const cont = document.getElementById('container-cards');
            cont.innerHTML = data.length ? '' : '<p>Nenhum item nesta obra.</p>';
            data.forEach(item => {
                cont.innerHTML += `
                    <div class="card-ativo">
                        <h4>${item.equipamento}</h4>
                        <p>Forn: ${item.fornecedor} | Fim: ${item.data_fim || 'Patrimônio'}</p>
                        ${item.unidade !== 'Proprio' ? `<button class="btn-renovar-mob" onclick="renovarMob(${item.id}, '${item.data_fim}', '${item.unidade}')">🔄 RENOVAR PERÍODO</button>` : ''}
                    </div>`;
            });
        }
    }

    window.renovarMob = async (id, fim, uni) => {
        let d = new Date(fim);
        if(uni === 'Mês') d.setDate(d.getDate() + 30); else d.setDate(d.getDate() + 15);
        await client.from('locacoes').update({ data_fim: d.toISOString().split('T')[0] }).eq('id', id);
        alert("Renovado!"); toggleAtivos();
    };

    function abrirModal(t) { document.getElementById('ai-modal').style.display = 'flex'; document.getElementById('modal-text').innerText = t; }
    function fecharModal() { document.getElementById('ai-modal').style.display = 'none'; }
</script>
</body>
</html>
