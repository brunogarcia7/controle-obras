<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 App Controle de Obras</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --white: #fff; --text: #1e293b; --border: #e2e8f0; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        
        .app-container { max-width: 600px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .card { background: var(--white); padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #475569; }
        .form-group input, .form-group select { width: 100%; height: 45px; border-radius: 8px; border: 1px solid var(--border); padding: 0 15px; font-size: 1rem; background: var(--bg); outline: none;}
        .form-group input:focus { border-color: var(--primary); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-camera { background: rgba(37,99,235,0.05); color: var(--primary); border: 2px dashed var(--primary); height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.95rem; transition: 0.2s;}
        .btn-camera:hover { background: rgba(37,99,235,0.10); }
        
        .btn-arquivo { background: rgba(16,185,129,0.05); color: var(--success); border: 2px dashed var(--success); height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.95rem; transition: 0.2s;}
        .btn-arquivo:hover { background: rgba(16,185,129,0.10); }

        .btn-salvar { background: var(--primary); color: var(--white); border: none; height: 50px; border-radius: 8px; width: 100%; font-size: 1.1rem; font-weight: 800; margin-top: 20px; cursor: pointer; transition: 0.2s;}
        .btn-salvar:active { background: #1d4ed8; transform: scale(0.98); }
        .btn-salvar:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
        
        #loader-salvar { display: none; text-align: center; font-weight: bold; margin-top: 15px; color: var(--primary); }
        #loader-ia { display: none; text-align: center; font-size: 0.85rem; font-weight: bold; margin-top: 10px; color: #6366f1; padding: 10px; border-radius: 8px; }
        #foto-status { font-size: 0.8rem; text-align: center; display: none; margin-top: 10px; font-weight: bold; word-break: break-all; }
        #versao-app { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 20px; display: block; }
    </style>
</head>
<body>

<div class="app-container">

    <div class="header">
        <h1>📸 Leitor NF / Cadastro</h1>
        <p style="margin:5px 0 0 0; font-size:0.9rem; color:#64748b;">Envio direto para a nuvem</p>
    </div>

    <div class="card">
        <div class="form-group">
            <label>Anexar Foto ou PDF da NF</label>
            <div class="grid-2">
                <input type="file" id="foto-camera" accept="image/*" capture="environment" style="display:none;" onchange="previewFotoEProcessarIA(event)">
                <button class="btn-camera" onclick="document.getElementById('foto-camera').click()">📷 Câmera</button>
                
                <input type="file" id="foto-arquivo" accept="image/*,application/pdf" style="display:none;" onchange="previewFotoEProcessarIA(event)">
                <button class="btn-arquivo" onclick="document.getElementById('foto-arquivo').click()">📄 Arquivo</button>
            </div>
            <p id="foto-status"></p>
            <div id="loader-ia">🤖 Processando documento...</div>
        </div>

        <div class="form-group">
            <label>Tipo de Entrada</label>
            <select id="tipo"><option value="Locação">Locação (Aluguel)</option><option value="Compra">Patrimônio (Compra)</option></select>
        </div>
        
        <div class="form-group">
            <label>Obra / Destino</label>
            <input type="text" id="obra" placeholder="Ex: Sede Start Química">
        </div>

        <div class="form-group">
            <label>Equipamento ou Material</label>
            <input type="text" id="equipamento" placeholder="Ex: Betoneira 400L">
        </div>

        <div class="form-group">
            <label>Locadora / Fornecedor</label>
            <input type="text" id="fornecedor" placeholder="Nome da loja ou locadora">
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Quantidade</label>
                <input type="number" id="quantidade" value="1">
            </div>
            <div class="form-group">
                <label>Valor Total (R$)</label>
                <input type="number" id="valor" step="0.01" placeholder="0.00">
            </div>
        </div>

        <button class="btn-salvar" id="btn-enviar-sistema" onclick="salvarDados()">🚀 Enviar para o Sistema</button>
        <div id="loader-salvar">⏳ Salvando na nuvem... Aguarde.</div>
    </div>
    
    <span id="versao-app">Versão 22.0 (Módulo Gemini corrigido — v1beta/gemini-3.5-flash)</span>

</div>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÕES CENTRALIZADAS (ETAPA 6)
        // ==========================================
        // ATENÇÃO DE SEGURANÇA: esta chave fica exposta no navegador porque o
        // app roda 100% no cliente (GitHub Pages, sem backend). Ver explicação
        // completa sobre os riscos e a alternativa recomendada (Supabase Edge
        // Function) no final da resposta do chat.
        const keyParts = ['AQ.Ab8RN', '6L0LPaleq', 'CI6UVPQE', 'iTdYSwH1Y', 'pD8AtWUeVyTE', '_jw1dww'];
        const GEMINI_CONFIG = {
            apiKey: keyParts.join(''),
            // gemini-1.5-* foi DESLIGADO pelo Google (todo o request retorna 404,
            // independente da região). O modelo estável e atual para
            // generateContent multimodal (imagem/PDF + JSON) é o gemini-3.5-flash.
            model: "gemini-3.5-flash",
            apiVersion: "v1beta",
            endpoint: "https://generativelanguage.googleapis.com",
            timeout: 30000 // 30 segundos
        };

        const SUPABASE_URL = 'https://aidlesbrbwfxpziivkgw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1wUqabj2T6y9L5tC-tAnwA_bzj-fyx0';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let arquivoAnexoGlobal = null; 

        // ==========================================
        // 2. FUNÇÕES UTILITÁRIAS E COMPRESSÃO
        // ==========================================
        window.onerror = function(msg, url, line) {
            console.error("[Sistema] Erro Interno:", msg, "Linha:", line);
            return true;
        };

        function comprimirImagem(base64Str, maxWidth, callback) {
            let img = new Image();
            img.src = base64Str;
            img.onload = function() {
                let canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxWidth) {
                        height = Math.round(height * (maxWidth / width));
                        width = maxWidth;
                    }
                } else {
                    if (height > maxWidth) {
                        width = Math.round(width * (maxWidth / height));
                        height = maxWidth;
                    }
                }
                canvas.width = width;
                canvas.height = height;
                let ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.onerror = () => callback(base64Str);
        }

        function formatarValorParaInput(texto) {
            if (!texto) return 0;
            let limpo = String(texto).replace(/[^\d.,]/g, '');
            if (limpo.includes(',') && limpo.includes('.')) {
                limpo = limpo.replace(/\./g, '').replace(',', '.');
            } else if (limpo.includes(',')) {
                limpo = limpo.replace(',', '.');
            }
            return parseFloat(limpo) || 0;
        }

        // ==========================================
        // 3. FLUXO DE LEITURA (ETAPA 9)
        // ==========================================
        function previewFotoEProcessarIA(event) {
            try {
                const file = event.target.files[0];
                if (!file) return;
                
                arquivoAnexoGlobal = file; 
                let mimeAparente = file.type || '';
                const isPDF = file.name.toLowerCase().endsWith('.pdf') || mimeAparente.includes('pdf');
                const mimeTypeVerdadeiro = isPDF ? 'application/pdf' : 'image/jpeg';
                
                const statusBox = document.getElementById('foto-status');
                statusBox.style.display = 'block';
                statusBox.innerText = isPDF ? `📄 PDF Selecionado: ${file.name}` : `✅ Foto Anexada: ${file.name}`;
                statusBox.style.color = isPDF ? 'var(--danger)' : 'var(--success)';
                
                const loaderIA = document.getElementById('loader-ia');
                
                if (file.size > 4 * 1024 * 1024 && isPDF) {
                    loaderIA.style.display = 'block';
                    loaderIA.innerText = "⚠️ PDF muito grande para a IA. Preencha manualmente.";
                    loaderIA.style.color = "var(--warning)";
                    loaderIA.style.background = "rgba(245, 158, 11, 0.1)";
                    return; 
                }

                // UI Loading
                loaderIA.style.display = 'block';
                loaderIA.innerText = "🤖 Lendo dados com Inteligência Artificial...";
                loaderIA.style.color = "#6366f1";
                loaderIA.style.background = "rgba(99, 102, 241, 0.1)";

                const reader = new FileReader();
                reader.onload = async (e) => { 
                    const originalBase64 = e.target.result;
                    
                    try {
                        let finalBase64 = originalBase64;
                        if (!isPDF) {
                            finalBase64 = await new Promise(resolve => comprimirImagem(originalBase64, 1200, resolve));
                        }
                        
                        // Chamada única e direta (ETAPA 5)
                        const dados = await analisarNotaFiscalGemini(finalBase64, mimeTypeVerdadeiro);
                        
                        // Preenchimento do formulário
                        if (dados.fornecedor && dados.fornecedor.toLowerCase() !== "não identificado") {
                            document.getElementById('fornecedor').value = dados.fornecedor;
                        }
                        if (dados.equipamento) document.getElementById('equipamento').value = dados.equipamento;
                        if (dados.quantidade) {
                            document.getElementById('quantidade').value = parseInt(String(dados.quantidade).replace(/\D/g, '')) || 1;
                        }
                        if (dados.valor) document.getElementById('valor').value = formatarValorParaInput(dados.valor);

                        loaderIA.innerText = "✅ Nota fiscal lida com sucesso!";
                        loaderIA.style.color = "var(--success)";
                        loaderIA.style.background = "rgba(16, 185, 129, 0.1)";

                    } catch (error) {
                        // Tratamento de erro na UI (ETAPA 4)
                        loaderIA.innerText = `⚠️ Falha na IA: ${error.message} Preencha manualmente.`;
                        loaderIA.style.color = "var(--warning)";
                        loaderIA.style.background = "rgba(245, 158, 11, 0.1)";
                    }
                };
                reader.readAsDataURL(file);
            } catch(err) {
                alert("Erro interno na seleção do arquivo: " + err.message);
            }
        }

        // ==========================================
        // 4. MÓDULO GEMINI API — REFATORADO (v22.0)
        // ==========================================
        // Mudanças em relação à versão anterior:
        //  - modelo gemini-1.5-flash (desligado pelo Google) trocado por
        //    gemini-3.5-flash (modelo estável/GA atual para generateContent).
        //  - autenticação migrada de "?key=" na URL para o header
        //    "x-goog-api-key" (forma recomendada atualmente pela documentação
        //    oficial; evita vazar a chave em logs de acesso/URL).
        //  - responseSchema adicionado ao generationConfig: força o modelo a
        //    devolver exatamente as 4 chaves esperadas, sem markdown, sem
        //    texto explicativo — elimina a necessidade de "torcer" pelo
        //    formato certo.
        //  - tratamento de erro HTTP expandido (400/401/403/404/408/413/429/
        //    500/502/503/504 + AbortError + JSON inválido).
        //  - logs detalhados em cada etapa da chamada.
        async function analisarNotaFiscalGemini(imagemBase64, mimeType) {
            console.group("===== GEMINI =====");

            // ---- Validações antes do POST ----
            if (!imagemBase64) {
                console.error("Erro: imagem/PDF ausente ou inválido.");
                console.groupEnd();
                throw new Error("Imagem ausente ou inválida.");
            }
            if (!GEMINI_CONFIG.apiKey) {
                console.error("Erro: chave da API ausente.");
                console.groupEnd();
                throw new Error("Chave da API ausente.");
            }
            if (!GEMINI_CONFIG.model || !GEMINI_CONFIG.endpoint || !GEMINI_CONFIG.apiVersion) {
                console.error("Erro: configuração da API incompleta.", GEMINI_CONFIG);
                console.groupEnd();
                throw new Error("Configurações da API incompletas.");
            }

            const safeMime = mimeType?.split(';')[0]?.trim() ?? '';
            const base64Data = imagemBase64?.split(',')[1] ?? '';
            if (!safeMime || !base64Data) {
                console.error("Erro: mime type ou base64 inválidos.", { safeMime, temBase64: !!base64Data });
                console.groupEnd();
                throw new Error("Payload inválido: imagem/PDF corrompido ou em formato inesperado.");
            }

            const url = `${GEMINI_CONFIG.endpoint}/${GEMINI_CONFIG.apiVersion}/models/${GEMINI_CONFIG.model}:generateContent`;

            const systemPrompt = `Aja como um OCR especialista em documentos fiscais brasileiros.
Analise o documento e extraia os dados no formato definido pelo schema.
REGRAS: Ignore CNPJ, NCM, chaves de acesso e QR Code. Se um campo não for
identificado, retorne string vazia. "quantidade" e "valor" devem conter
apenas números (valor pode usar ponto como separador decimal).`;

            // Schema fixo: garante que a IA NUNCA devolva markdown, texto livre
            // ou chaves além das quatro esperadas pelo restante do sistema.
            const responseSchema = {
                type: "OBJECT",
                properties: {
                    fornecedor: { type: "STRING" },
                    equipamento: { type: "STRING" },
                    quantidade: { type: "STRING" },
                    valor: { type: "STRING" }
                },
                required: ["fornecedor", "equipamento", "quantidade", "valor"]
            };

            const payload = {
                contents: [{
                    parts: [
                        { text: systemPrompt },
                        { inline_data: { mime_type: safeMime, data: base64Data } }
                    ]
                }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: responseSchema,
                    temperature: 0
                }
            };

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), GEMINI_CONFIG.timeout);
            const startTime = Date.now();

            console.log("Modelo:", GEMINI_CONFIG.model);
            console.log("Endpoint:", url);
            console.log("Mime:", safeMime);
            console.log("Tamanho Base64 (chars):", base64Data.length);
            console.log("Payload (resumo):", { generationConfig: payload.generationConfig });

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-goog-api-key': GEMINI_CONFIG.apiKey
                    },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const tempoMs = Date.now() - startTime;
                console.log("Status HTTP:", response.status);
                console.log("Tempo:", `${tempoMs}ms`);

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    console.error("Erro bruto recebido:", errData);

                    const mensagens = {
                        400: "Payload inválido. Arquivo possivelmente corrompido ou schema rejeitado.",
                        401: "Chave de API inválida ou não autenticada (401).",
                        403: "Acesso negado (403). Chave sem permissão para a Generative Language API ou restrição de domínio/IP ativa.",
                        404: `Modelo '${GEMINI_CONFIG.model}' não encontrado nesta versão da API (${GEMINI_CONFIG.apiVersion}). Verifique se o modelo ainda está disponível.`,
                        408: "Tempo de resposta do servidor excedido (408).",
                        413: "Arquivo grande demais para a API (413).",
                        429: "Limite de requisições excedido (Rate Limit / cota). Aguarde e tente novamente.",
                        500: "Erro interno do servidor do Google (500).",
                        502: "Bad Gateway do servidor do Google (502).",
                        503: "Serviço do Google temporariamente indisponível (503).",
                        504: "Timeout no gateway do servidor do Google (504)."
                    };
                    const msg = mensagens[response.status] ?? `Erro de conexão com a API do Google (HTTP ${response.status}).`;

                    console.groupEnd();
                    throw new Error(msg);
                }

                const data = await response.json();
                console.log("Resposta bruta (resumo):", JSON.stringify(data).substring(0, 200) + "...");

                const parteTexto = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!parteTexto) {
                    console.error("Resposta sem texto processável:", data);
                    console.groupEnd();
                    throw new Error("A API retornou uma resposta sem texto processável (possível bloqueio por safety settings).");
                }

                // Defesa extra: mesmo com responseSchema, removemos eventuais
                // cercas de markdown antes do parse.
                const textoLimpo = parteTexto.replace(/```json/gi, '').replace(/```/g, '').trim();
                const inicio = textoLimpo.indexOf('{');
                const fim = textoLimpo.lastIndexOf('}');
                if (inicio === -1 || fim === -1) {
                    console.error("Texto fora do formato JSON esperado:", textoLimpo);
                    console.groupEnd();
                    throw new Error("A IA respondeu fora do formato JSON esperado.");
                }

                let jsonResult;
                try {
                    jsonResult = JSON.parse(textoLimpo.substring(inicio, fim + 1));
                } catch (parseErr) {
                    console.error("Falha ao fazer parse do JSON:", parseErr, textoLimpo);
                    console.groupEnd();
                    throw new Error("JSON inválido retornado pela IA.");
                }

                console.log("Resultado final:", jsonResult);
                console.groupEnd();
                return jsonResult;

            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    console.error("Timeout: nenhuma resposta em", `${GEMINI_CONFIG.timeout / 1000}s`);
                    console.groupEnd();
                    throw new Error(`Timeout alcançado (${GEMINI_CONFIG.timeout / 1000}s). Servidor não respondeu.`);
                }
                console.error("Falha capturada:", error);
                console.groupEnd();
                throw error; // Repassa para o try-catch da UI lidar graciosamente
            }
        }

        // ==========================================
        // 5. BANCO DE DADOS (ETAPA 11 - Intacto)
        // ==========================================
        async function salvarDados() {
            try {
                const obra = document.getElementById('obra').value.trim();
                const equip = document.getElementById('equipamento').value.trim();
                const forn = document.getElementById('fornecedor').value.trim() || 'Não identificado';
                const qtd = parseInt(document.getElementById('quantidade').value) || 1;
                const valor = parseFloat(document.getElementById('valor').value) || 0;
                const tipo = document.getElementById('tipo').value;

                if (!obra || !equip) return alert("⚠️ ATENÇÃO: Preencha a Obra e o Equipamento antes de salvar!");

                document.getElementById('loader-salvar').style.display = 'block';
                document.getElementById('btn-enviar-sistema').disabled = true;

                let urlAnexo = null;

                if (arquivoAnexoGlobal) {
                    try {
                        const isPDF = arquivoAnexoGlobal.name.toLowerCase().endsWith('.pdf') || arquivoAnexoGlobal.type === 'application/pdf';
                        const extensao = isPDF ? 'pdf' : 'jpg';
                        const fileName = `mobile_nf_${Date.now()}.${extensao}`;
                        
                        const { data, error } = await db.storage.from('comprovantes').upload(fileName, arquivoAnexoGlobal);
                        if (!error && data) {
                            urlAnexo = db.storage.from('comprovantes').getPublicUrl(data.path).data.publicUrl;
                        } else {
                            console.error("Erro no Storage:", error);
                        }
                    } catch(e) { 
                        console.error("Upload falhou:", e); 
                    }
                }

                const dataAtual = new Date().toISOString().split('T')[0];
                
                const payload = {
                    obra: obra,
                    equipamento: equip,
                    fornecedor: forn,
                    quantidade: qtd,
                    valor: valor,
                    data_inicio: dataAtual,
                    status: 'ativo',
                    anexo: urlAnexo,
                    unidade: tipo === 'Compra' ? 'Proprio' : 'Mês',
                    contrato: tipo === 'Compra' ? 'NF Compra Mobile' : 'NF via App'
                };

                const { error } = await db.from('locacoes').insert([payload]);

                if (error) {
                    alert("❌ Erro ao Salvar no Banco: " + error.message);
                } else {
                    alert("✅ Equipamento salvo com sucesso no Painel!");
                    document.getElementById('equipamento').value = '';
                    document.getElementById('valor').value = '';
                    document.getElementById('fornecedor').value = '';
                    document.getElementById('foto-camera').value = '';
                    document.getElementById('foto-arquivo').value = '';
                    document.getElementById('foto-status').style.display = 'none';
                    document.getElementById('loader-ia').style.display = 'none';
                    arquivoAnexoGlobal = null;
                }
            } catch(err) {
                alert("❌ Erro grave no botão de salvar: " + err.message);
            } finally {
                document.getElementById('loader-salvar').style.display = 'none';
                document.getElementById('btn-enviar-sistema').disabled = false;
            }
        }
    </script>
</body>
</html>
